format = """
$os$username$hostname$directory$git_branch$git_state$git_status$python$rust$golang$nodejs$docker_context$line_break$character"""
right_format = "$time$cmd_duration"

[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold blue"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style      = "bold yellow"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?"
modified   = "!"
staged     = "+"
renamed    = ""
deleted    = "✘"

[python]
symbol             = " "
pyenv_version_name = true
style              = "bold yellow"

[nodejs]
symbol = " "
style  = "bold green"

[rust]
symbol = " "
style  = "bold orange"

[golang]
symbol = " "
style  = "bold cyan"

[time]
disabled    = false
format      = "[$time]($style) "
time_format = "%H:%M"
style       = "dimmed white"

[cmd_duration]
min_time = 500
format   = "took [$duration](bold yellow) "
