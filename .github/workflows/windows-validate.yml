# WinForge — Windows Validation CI
# Runs on push/PR; validates PS syntax and winget package IDs on a real Windows runner

name: Windows Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-syntax:
    name: PowerShell Syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PowerShell 7
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -lt 7) {
            winget install --id Microsoft.PowerShell --silent --accept-package-agreements
          }
          Write-Host "PowerShell version: $($PSVersionTable.PSVersion)"

      - name: Parse all .ps1 files
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter '*.ps1' | ForEach-Object {
            $tokens = $null; $parseErrors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count -gt 0) {
              $parseErrors | ForEach-Object {
                $errors += "$($_.Extent.File): $($_.Message)"
              }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }
          Write-Host "All PowerShell files parsed cleanly."

  validate-manifests:
    name: Manifest JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON manifests
        run: |
          for f in tiers/*.json; do
            python3 -c "import json,sys; json.load(open('$f'))" && echo "ok $f"
          done

  validate-packages:
    name: Winget Package IDs
    runs-on: windows-latest
    needs: [validate-syntax, validate-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Configure winget sources
        shell: pwsh
        run: |
          winget source update --disable-interactivity
          Add-AppxPackage -RegisterByFamilyName -MainPackage Microsoft.DesktopAppInstaller_8wekyb3d8bbwe -ErrorAction SilentlyContinue

      - name: Check all package IDs exist
        shell: pwsh
        run: |
          $missing = [System.Collections.Generic.List[string]]::new()
          $tiers   = Get-ChildItem -Path tiers -Filter '*.json'

          foreach ($tierFile in $tiers) {
            $tier = $tierFile.BaseName
            $pkgs = Get-Content $tierFile.FullName | ConvertFrom-Json
            foreach ($pkg in $pkgs) {
              if ($pkg.manager -eq 'scoop') {
                Write-Host "skip (scoop) $($pkg.id)"
                continue
              }
              $r = winget show --id $pkg.id --exact --accept-source-agreements 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "MISSING in winget: $($pkg.id) (tier ${tier})"
                $missing.Add("${tier}:$($pkg.id)")
              } else {
                Write-Host "ok   $($pkg.id)"
              }
            }
          }

          if ($missing.Count -gt 0) {
            Write-Error "Missing packages ($($missing.Count)): $($missing -join ', ')"
            exit 1
          }
          Write-Host "All package IDs verified."
